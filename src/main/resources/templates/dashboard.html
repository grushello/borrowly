<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard/itemsListWidget.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard/financialSummaryWidget.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard/transactionsWidget.css}">
</head>
<body>
    <nav th:replace="~{fragments/general/nav :: nav}">
    </nav>

    <h1 th:text="|${user.firstName} ${user.lastName}|">User name</h1>

    <main class="dashboard-grid">
        <div th:replace="~{fragments/dashboard/activeRentalsWidget :: activeRentalsWidget(activeRentals=${activeRentalsAsBorrower}, role='Borrower')}">...</div>

        <div th:replace="~{fragments/dashboard/activeRentalsWidget :: activeRentalsWidget(activeRentals=${activeRentalsAsOwner}, role='Owner')}">...</div>

        <div th:replace="~{fragments/dashboard/financialSummaryWidget :: financialSummaryWidget}">...</div>

        <div th:replace="~{fragments/dashboard/transactionsWidget :: transactionsWidget}">...</div>

        <div th:replace="~{fragments/dashboard/favoritesWidget :: favoritesWidget}">...</div>

        <div th:replace="~{fragments/dashboard/userItemListingsWidget :: userItemListingsWidget}">...</div>
    </main>

    <footer th:insert="~{fragments/general/footer :: footer}">
    </footer>

</body>
<script src="/js/csrf.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const returnItemButtons  = document.querySelectorAll('.return-item-button');
        if (returnItemButtons) returnItemButtons.forEach(returnItemButton => {
            returnItemButton.addEventListener('click', (e) => {
                const rentalId = e.target.getAttribute('data-rental-id');
                const url = `/api/rentals/${rentalId}/return`;
                console.log(url)
                csrfFetch(url, {
                    method: 'PATCH'})
                    .then(async res => {
                        if (res.ok) {
                            alert('Item returned correctly.');
                            window.location.reload();
                        } else {
                            const error = await res.json();
                            console.log(error.message)
                            alert(error.message);
                        }
                })
            })
        })

        const topUpButton = document.getElementById('topUpButton');

        if (topUpButton) {
            topUpButton.addEventListener('click', async () => {

                const amountInput = document.getElementById('topUpAmount');
                const amount = Number(amountInput.value);

                if (!amount || amount <= 0) {
                    alert('Amount must be positive.');
                    return;
                }

                const response = await csrfFetch('/api/transactions/top-up', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        amount: amount
                    })
                });

                if (response.ok) {
                    alert('Balance refilled successfully.');
                    window.location.reload();
                } else {
                    const error = await response.json();
                    alert(error.message || 'Failed to refill balance.');
                }
            });
        }
    })
</script>
</html>
