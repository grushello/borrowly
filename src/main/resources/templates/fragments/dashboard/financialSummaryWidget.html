<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div th:fragment="financialSummaryWidget" class="widget financial-summary">
    <div class="widget-header">
        <h2>Financial summary</h2>
        <span class="header-icon">💳</span>
    </div>

    <div class="financial-metrics">

        <div class="metric primary-metric">
            <span class="metric-label">Blocked deposits</span>
            <h3 class="metric-value deposit-color" th:text="|€ ${summary != null ? summary.activeDeposits : '0.00'}|">
                € 150.00
            </h3>
            <p class="metric-hint">This money will be unlocked when items will ge given back.</p>
        </div>

        <div class="metric-divider"></div>

        <div class="metric secondary-metric">
            <span class="metric-label">Total rental expense (July)</span>
            <h4 class="metric-value" th:text="|€ ${summary != null ? summary.monthlySpent : '0.00'}|">
                € 45.00
            </h4>
        </div>

    </div>
</div>
</body>
</html>
