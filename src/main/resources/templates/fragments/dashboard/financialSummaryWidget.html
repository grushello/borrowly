<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div th:fragment="financialSummaryWidget" class="widget financial-summary">
    <div class="widget-header">
        <h2>Financial summary</h2>
        <span class="header-icon">💳</span>
    </div>

    <div class="financial-metrics">

        <div class="metric primary-metric">
            <span class="metric-label">Current balance</span>
            <h3 class="metric-value deposit-color" th:text="|€ ${user.currentBalance}|">
                € 150.00
            </h3>
        </div>

    </div>

    <div class="balance-top-up">
        <h3>Refill balance</h3>

        <input id="topUpAmount"
               type="number"
               min="0.01"
               step="0.01"
               placeholder="Amount">

        <button id="topUpButton">
            Refill
        </button>
    </div>
</div>
</body>
</html>
