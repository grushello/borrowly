<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active rentals widget</title>
</head>
<body>
<div th:fragment="activeRentalsWidget" class="widget active-rentals-widget">
    <div class="widget-header">
        <h2>Active rentals (as borrower) </h2>
    </div>

    <ul class="rental-list">

        <li th:each="rental : ${activeRentalsAsBorrower}" class="rental-item">

<!--            <img th:src="@{/api/items/{itemId}/images/{imageId}(itemId=${rental.item.id}, imageId=${images[0].id})}" th:alt="${rental.item.title}" class="rental-thumb">-->

            <div class="rental-info">
                <h4 th:text="${rental.item.title}">Fishing rod</h4>

                <p class="due-date">
                    Due date: <strong th:text="${#temporals.format(rental.endDate, 'dd MMM yyyy')}">18 Lug 2026</strong>
                </p>
            </div>

        </li>

        <li th:if="${#lists.isEmpty(activeRentalsAsBorrower)}" class="empty-state">
            <span>You don't have any active rentals </span>
            <a href="/">Explore the catalog!</a>
        </li>
    </ul>
</div>
</body>
</html>
