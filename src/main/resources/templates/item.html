<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${item.title}">Item details</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/itemPage/itemPage.css}">
</head>
<body>
    <nav th:replace="~{fragments/general/nav :: nav}">
    </nav>
    <main class="item-page-container" th:attr="data-item-id=${item.id}" id="main-content">

      <div class="item-gallery">

        <th:block th:if="${not #lists.isEmpty(images)}">

          <div class="main-image-wrapper">
            <img th:src="@{/api/items/{itemId}/images/{imageId}(itemId=${item.id}, imageId=${images[0].id})}"
                 alt="Main image"
                 class="main-image">
          </div>

          <div class="thumbnail-list">
            <div th:each="image : ${images}" class="thumbnail-wrapper">

              <img th:src="@{/api/items/{itemId}/images/{imageId}(itemId=${item.id}, imageId=${image.id})}"
                   alt="Thumbnail"
                   class="thumbnail">

              <button class="delete-image-btn"
                      th:data-image-id="${image.id}"
                      title="Delete image" th:if="${isOwner}" sec:authorize="isAuthenticated()">
                &times;
              </button>

            </div>
          </div>

        </th:block>

        <div th:if="${#lists.isEmpty(images)}" class="main-image-wrapper">
          <img src="/images/placeholder.jpg" alt="No image available" class="main-image">
        </div>

      </div>

      <div class="item-info">

        <span class="category-badge" th:text="${item.category.name}">Category placeholder</span>
        <h1 class="item-title" th:text="${item.title}">Title placeholder</h1>

        <div class="item-meta">
            <span class="rating">
                ⭐ <strong>4.8</strong>
                <span class="review-count">(14 reviews)</span>
            </span>
          <span class="meta-divider">•</span>
          <span class="condition" th:text="'Condition: ' + ${item.condition}">Condition: PLACEHOLDER</span>
        </div>

        <div class="item-description">
          <h3>Description</h3>
          <p th:text="${item.description}">Description placeholder</p>
        </div>

        <div class="booking-card">
          <div class="price-header">
            <span class="daily-price" th:text="${item.pricePerDay} + ' €'">€ 0.00</span>
            <span class="price-suffix">/ day</span>
          </div>

          <ul class="price-details">
            <li>
              <span>Deposit required:</span>
              <strong th:text="${item.depositAmount} + ' €'">€ 0.00</strong>
            </li>
            <li sec:authorize="isAuthenticated()" th:unless="${isOwner}">
              <button id="favorite-btn"
                      th:data-item-id="${item.id}"
                      th:data-is-favorite="${isFavorite}"
                      th:text="${isFavorite ? 'Remove from favorites' : 'Add to favorites'}"
                      th:class="${isFavorite ? 'btn-remove-fav' : 'btn-add-fav'}">
                Add to favorites
              </button>
            </li>
          </ul>

          <button sec:authorize="isAnonymous()"
                  class="btn-book-disabled"
                  disabled>
            Request (Login required)
          </button>

          <div sec:authorize="isAuthenticated()">
            <div th:if="${isOwner}" class="owner-badge">
              <span>You are the owner of this item</span>
              <div class="owner-actions">
                <a th:href="@{/update/{id}(id=${item.id})}" class="btn btn-edit">Edit Listing</a>
                <button id="archive-btn"
                        class="btn btn-danger"
                        th:disabled="${item.itemStatus.name() == 'RENTED'}"
                        th:text="${item.itemStatus.name() == 'ARCHIVED' ? 'Unarchive' : (item.itemStatus.name() == 'RENTED' ? 'Cannot archive while rented' : 'Archive')}">
                  Archive
                </button>
              </div>
            </div>
            <div th:unless="${isOwner}" class="booking-section">
              <div id="booking-error" class="alert-error" style="display: none;"></div>

              <div class="date-pickers" th:unless="${itemRentalRequestPendingForUser}">
                <div class="input-group">
                  <label for="start-date">Start Date:</label>
                  <input type="date" id="start-date" required>
                </div>
                <div class="input-group">
                  <label for="end-date">End Date:</label>
                  <input type="date" id="end-date" required>
                </div>
              </div>

              <span th:if="${itemRentalRequestPendingForUser}">You have already requested this item</span>
              <button th:unless="${itemRentalRequestPendingForUser}" id="request-btn" class="btn-book">Request</button>
              <button th:if="${itemRentalRequestPendingForUser != null && pendingRentalRequestId != null}"
                      id="request-btn-already-requested"
                      class="btn-book"
                      th:data-rental-request-id="${pendingRentalRequestId}">Cancel request</button>
            </div>

          </div>

        </div>

        <div class="owner-profile">
          <div class="owner-avatar">
            <span th:text="${item.owner.firstName.charAt(0)}">A</span>
          </div>
          <div class="owner-details">
            <span class="owner-label">Owner</span>
            <strong th:if="${!isOwner}" th:text="${item.owner.firstName} + ' ' + ${item.owner.lastName}">Owner</strong>
            <strong th:if="${isOwner}" th:text="'You'">Owner</strong>
          </div>
        </div>

      </div>

      <div class="upload-section" th:if="${isOwner}" sec:authorize="isAuthenticated()">
        <label for="image-upload">Add an image:</label>
        <input type="file" id="image-upload" name="file" accept="image/*">
        <button id="upload-btn" type="button">Upload an image</button>
      </div>
  </main>

  <footer th:replace="~{fragments/general/footer :: footer}">
  </footer>

</body>
<script src="/js/csrf.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const uploadBtn = document.getElementById('upload-btn');
    const fileInput = document.getElementById('image-upload');

    if (uploadBtn && fileInput) {
      uploadBtn.addEventListener('click', function() {
        const files = fileInput.files;

        if (files.length === 0) {
          alert("Select at least an image before uploading.");
          return;
        }

        const file = files[0];
        const itemId = document.getElementById("main-content").getAttribute('data-item-id');
        const uploadUrl = `/api/items/${itemId}/images`;

        uploadBtn.disabled = true;
        uploadBtn.textContent = 'Uploading...';

        const formData = new FormData();
        formData.append('file', file);

        csrfFetch(uploadUrl, {
          method: 'POST',
          body: formData
        })
                .then(response => {
                  if (response.ok) {
                    alert('Image uploaded correctly!');
                    window.location.reload();
                  } else {
                    alert('Error while trying to upload');
                  }
                })
                .catch(err => {
                  console.error('Error:', err);
                  alert('Network Error');
                })
                .finally(() => {
                  uploadBtn.disabled = false;
                  uploadBtn.textContent = 'Upload image';
                  fileInput.value = '';
                });
      });
    }

    const mainImage = document.querySelector('.main-image');
    const thumbnails = document.querySelectorAll('.thumbnail');

    if (mainImage && thumbnails.length > 0) {

      thumbnails.forEach(thumbnail => {
        thumbnail.addEventListener('click', function() {

          mainImage.src = this.src;

          thumbnails.forEach(t => t.style.opacity = '1');
          this.style.opacity = '0.5';
        });
      });

    }

    const deleteButtons = document.querySelectorAll('.delete-image-btn');

    deleteButtons.forEach(btn => {
      btn.addEventListener('click', function(event) {
        event.stopPropagation();

        if (!confirm("Are you sure you want to delete this item?")) {
          return;
        }

        const itemId = document.getElementById("main-content").getAttribute('data-item-id');
        const imageId = event.target.getAttribute('data-image-id');
        const deleteUrl = `/api/items/${itemId}/images/${imageId}`;

        event.target.disabled = true;

        csrfFetch(deleteUrl, {
          method: 'DELETE'
        })
                .then(response => {
                  if (response.ok) {
                    window.location.reload();

                  } else {
                    alert("Error while trying to delete");
                    event.target.disabled = false;
                  }
                })
                .catch(err => {
                  console.error("Error:", err);
                  alert("Network Error.");
                  this.disabled = false;
                });
      });
    });

    const favBtn = document.getElementById('favorite-btn');
    const archiveBtn = document.getElementById('archive-btn');

    archiveBtn.addEventListener('click', (event) => {
      event.stopPropagation();

      const itemId = document.getElementById("main-content").getAttribute('data-item-id');

      const isArchiving = event.target.textContent === "Archive";
      const method = isArchiving ? "DELETE" : "PATCH";
      const url = isArchiving ? "/api/items/" + itemId : "/api/items/" + itemId + "/unarchive";

      event.target.disabled = true;

      fetch(url, {
        method: method,
      }).then(response => {
        if (response.ok) {
          event.target.textContent = isArchiving ? 'Unarchive' : 'Archive';
        } else {
          alert(isArchiving ? 'Error trying to archive item.' : 'Error trying to unarchive item.');
        }
      }).catch(err => {
        console.error('Error:', err);
        alert('Network error.');
      }).finally(() => {
        event.target.disabled = false;
      });
    })


    if (!favBtn) return;

    favBtn.addEventListener('click', function() {
      const itemId = document.getElementById("main-content").getAttribute('data-item-id');
      const isFavorite = this.getAttribute('data-is-favorite') === 'true';

      const method = isFavorite ? 'DELETE' : 'POST';

      const url = '/api/favorites/' + itemId;

      favBtn.disabled = true;

      csrfFetch(url, {
        method: method,
      })
              .then(response => {
                if (response.ok) {
                  const newState = !isFavorite;
                  this.setAttribute('data-is-favorite', newState);
                  this.innerText = newState ? 'Remove from favorites' : 'Add to favorites';

                  this.classList.toggle('btn-add-fav', !newState);
                  this.classList.toggle('btn-remove-fav', newState);
                } else {
                  alert('Error during the update of favorites.');
                }
              })
              .catch(err => {
                console.error('Error:', err);
                alert('Network error.');
              })
              .finally(() => {
                favBtn.disabled = false;
              });
    });
  });
</script>
</html>
