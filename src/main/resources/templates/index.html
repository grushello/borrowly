<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrowly — Home</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/catalog/catalogCard.css}">
</head>
<body>

    <nav th:replace="~{fragments/general/nav :: nav}">
    </nav>

    <main>
        <div th:if="${itemPage.isEmpty()}" class="no-results">
            <p>The catalog is empty.</p>
        </div>

        <ul class="catalog-card-container" th:unless="${itemPage.isEmpty()}">

            <th:block th:each="item, iterStat : ${itemPage.content}">
                <li th:replace="~{fragments/catalog/catalogCard :: catalogCard(
            name = ${item.title},
            condition = ${item.condition},
            index = ${iterStat.count},
            pricePerDay = ${item.pricePerDay},
            id = ${item.id},
        )}">
                </li>

            </th:block>

        </ul>
<!--            <nav th:replace="~{fragments/general/paginationContainer :: paginationContainer}">-->
<!--            </nav>-->
    </main>

    <footer th:replace="~{fragments/general/footer :: footer}">
    </footer>

</body>
</html>
