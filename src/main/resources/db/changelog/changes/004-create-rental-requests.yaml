databaseChangeLog:
  - changeSet:
      id: 004-create-rental-requests
      author: edgaras
      changes:
        - createTable:
            tableName: rental_requests
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_rental_requests
              - column:
                  name: item_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: borrower_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: requested_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_rental_requests_item_id
            baseTableName: rental_requests
            baseColumnNames: item_id
            referencedTableName: items
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_rental_requests_borrower_id
            baseTableName: rental_requests
            baseColumnNames: borrower_id
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            indexName: idx_rental_requests_item_id
            tableName: rental_requests
            columns:
              - column:
                  name: item_id
        - createIndex:
            indexName: idx_rental_requests_borrower_id
            tableName: rental_requests
            columns:
              - column:
                  name: borrower_id
        - sql:
            sql: >-
              ALTER TABLE rental_requests
                ADD CONSTRAINT ck_rental_requests_status CHECK (status IN ('PENDING', 'APPROVED', 'REJECTED', 'CANCELED')),
                ADD CONSTRAINT ck_rental_requests_date_range CHECK (end_date >= start_date)
      rollback:
        - dropTable:
            tableName: rental_requests
