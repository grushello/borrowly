databaseChangeLog:
  - changeSet:
      id: 008-create-favorites
      author: edgaras
      changes:
        - createTable:
            tableName: favorites
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_favorites
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: item_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_favorites_user_id
            baseTableName: favorites
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_favorites_item_id
            baseTableName: favorites
            baseColumnNames: item_id
            referencedTableName: items
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            constraintName: uk_favorites_user_id_item_id
            tableName: favorites
            columnNames: user_id, item_id
        - createIndex:
            indexName: idx_favorites_item_id
            tableName: favorites
            columns:
              - column:
                  name: item_id
