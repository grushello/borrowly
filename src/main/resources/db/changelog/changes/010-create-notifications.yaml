databaseChangeLog:
  - changeSet:
      id: 010-create-notifications
      author: edgaras
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_notifications
              - column:
                  name: recipient_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: rental_id
                  type: uuid
              - column:
                  name: transaction_id
                  type: uuid
              - column:
                  name: message
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
        # A notification is disposable: if the recipient goes, it goes with them. The
        # rental and transaction links are only context, so they restrict like the rest.
        - addForeignKeyConstraint:
            constraintName: fk_notifications_recipient_id
            baseTableName: notifications
            baseColumnNames: recipient_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_notifications_rental_id
            baseTableName: notifications
            baseColumnNames: rental_id
            referencedTableName: rentals
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_notifications_transaction_id
            baseTableName: notifications
            baseColumnNames: transaction_id
            referencedTableName: transactions
            referencedColumnNames: id
        - createIndex:
            indexName: idx_notifications_recipient_id
            tableName: notifications
            columns:
              - column:
                  name: recipient_id
        - createIndex:
            indexName: idx_notifications_rental_id
            tableName: notifications
            columns:
              - column:
                  name: rental_id
        - createIndex:
            indexName: idx_notifications_transaction_id
            tableName: notifications
            columns:
              - column:
                  name: transaction_id
        - sql:
            sql: >-
              ALTER TABLE notifications
                ADD CONSTRAINT ck_notifications_type CHECK (type IN ('RENTAL_REQUEST', 'RENTAL_APPROVED', 'RENTAL_REJECTED', 'ITEM_RETURNED', 'PAYMENT_RECEIVED', 'FINE', 'GENERAL')),
                ADD CONSTRAINT ck_notifications_message_not_blank CHECK (btrim(message) <> '')
      rollback:
        - dropTable:
            tableName: notifications
