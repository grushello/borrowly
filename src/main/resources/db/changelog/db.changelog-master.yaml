# Master changelog. Liquibase runs the changesets listed here, in order, on
# application startup. As the domain model grows, add one changeset file per
# change under db/changelog/changes/ and include it below, e.g.:
#
#   - include:
#       file: db/changelog/changes/001-create-users.yaml
#
# Never edit a changeset after it has run on a shared database; add a new one.
databaseChangeLog:
  - include:
      file: db/changelog/changes/001-create-users.yaml
  - include:
      file: db/changelog/changes/002-create-categories.yaml
